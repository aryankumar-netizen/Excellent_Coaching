<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Course Details - Excellent Coaching</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-white navbar-light shadow sticky-top p-0">
    <a href="index.html" class="navbar-brand d-flex align-items-center px-4 px-lg-5">
        <img src="img/logo.png" alt="Logo" style="height: 60px;" class="me-2">
        
        <h2 class="m-0 text-primary">
            <strong style="font-weight: 800; letter-spacing: 1px;">Excellent Coaching</strong>
        </h2>
    </a>

    <button type="button" class="navbar-toggler me-4" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarCollapse">
        <div class="navbar-nav ms-auto p-4 p-lg-0">
            <a href="index.html" class="nav-item nav-link active">Home</a>
            <a href="about.html" class="nav-item nav-link">About</a>
            <a href="courses.html" class="nav-item nav-link">Courses</a>
            <div class="nav-item dropdown">
                <a href="#" class="nav-link dropdown-toggle" data-bs-toggle="dropdown">Pages</a>
                <div class="dropdown-menu fade-down m-0">
                    <a href="team.html" class="dropdown-item">Our Team</a>
                    <a href="testimonial.html" class="dropdown-item">Testimonial</a>
                    
                </div>
            </div>
            <a href="contact.html" class="nav-item nav-link">Contact</a>
        </div>
        <a href="" class="btn btn-primary py-4 px-lg-5 d-none d-lg-block">Join Now<i class="fa fa-arrow-right ms-3"></i></a>
    </div>
</nav>
    <div class="container py-5">
        <div class="row g-5">
            <div class="col-lg-6">
                <img id="courseImg" class="img-fluid rounded shadow" src="" alt="Course Image">
            </div>
            <div class="col-lg-6">
                <h1 id="courseTitle" class="mb-3">Course Title</h1>
                <h3 id="coursePrice" class="text-primary mb-4">$0.00</h3>
                <p id="courseDesc" class="lead mb-4">Description yahan ayegi.</p>
                
                <h4>What you will learn:</h4>
                <ul id="courseSkills" class="list-unstyled">
                    </ul>
                
                <button class="btn btn-primary btn-lg px-5 mt-4">Enroll Now</button>
            </div>
        </div>
    </div>

    <script>
        // Ye script check karegi URL ko (?id=web ya ?id=graphic)
        const params = new URLSearchParams(window.location.search);
        const courseId = params.get('id');

        const courseData = {
            'web': {
                title: "Web Design & Development",
                price: "$149.00",
                desc: "Learn to build modern, responsive websites using HTML5, CSS3, and Bootstrap.",
                img: "img/course-1.jpg",
                skills: ["HTML5 & CSS3", "Bootstrap 5", "Responsive Design", "JavaScript Basics"]
            },
            'graphic': {
                title: "Graphic Design Masterclass",
                price: "$120.00",
                desc: "Master visual communication and branding using Adobe Photoshop and Illustrator.",
                img: "img/course-2.jpg",
                skills: ["Logo Design", "Branding", "Adobe Photoshop", "Color Theory"]
            }
        };

        // Page par data fill karna
        if(courseData[courseId]) {
            const course = courseData[courseId];
            document.getElementById('courseTitle').innerText = course.title;
            document.getElementById('coursePrice').innerText = course.price;
            document.getElementById('courseDesc').innerText = course.desc;
            document.getElementById('courseImg').src = course.img;
            
            let skillsHtml = '';
            course.skills.forEach(skill => {
                skillsHtml += `<li><i class="fa fa-check text-success me-2"></i>${skill}</li>`;
            });
            document.getElementById('courseSkills').innerHTML = skillsHtml;
        }
    </script>
</body>
</html>
